<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Docker Manager</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <h1>Docker Manager</h1>
          <p id="subtitle">容器启动顺序和监控管理</p>
        </div>
        <div class="actions">
          <button id="refreshBtn">刷新</button>
          <button id="startupBtn" class="primary">按顺序启动</button>
        </div>
      </header>

      <section id="alert" class="alert hidden"></section>

      <section class="metrics">
        <div>
          <span>Docker</span>
          <strong id="dockerState">检查中</strong>
        </div>
        <div>
          <span>容器</span>
          <strong id="containerCount">0</strong>
        </div>
        <div>
          <span>异常</span>
          <strong id="badCount">0</strong>
        </div>
        <div>
          <span>上次刷新</span>
          <strong id="lastRefresh">-</strong>
        </div>
      </section>

      <main class="grid">
        <section class="panel wide">
          <div class="panel-head">
            <h2>容器</h2>
            <button id="saveBtn">保存配置</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>顺序</th>
                  <th>容器</th>
                  <th>镜像</th>
                  <th>状态</th>
                  <th>延迟</th>
                  <th>监控</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="containerRows"></tbody>
            </table>
          </div>
          <div id="emptyState" class="empty hidden">没有发现容器。</div>
        </section>

        <section class="panel">
          <h2>设置</h2>
          <label>
            检查间隔（秒）
            <input id="checkInterval" type="number" min="10" max="3600" />
          </label>
          <label>
            重试间隔（秒）
            <input id="retryDelay" type="number" min="3" max="600" />
          </label>
          <label>
            启动超时（秒）
            <input id="startupTimeout" type="number" min="15" max="3600" />
          </label>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>日志</h2>
            <button id="reloadLogsBtn">重载</button>
          </div>
          <div id="logs" class="logs"></div>
        </section>
      </main>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
