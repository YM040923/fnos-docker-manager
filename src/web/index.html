<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Docker Manager</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/app/dockermanager/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div>
            <h1>Docker Manager</h1>
            <p id="subtitle">容器启动顺序和运行监控</p>
          </div>
        </div>
        <div class="actions">
          <button id="refreshBtn" type="button">刷新</button>
          <button id="startupBtn" class="primary" type="button">按顺序启动</button>
        </div>
      </header>

      <section id="alert" class="alert hidden" role="status"></section>

      <section class="metrics" aria-label="运行概览">
        <div class="metric">
          <span>Docker 状态</span>
          <strong id="dockerState">检查中</strong>
        </div>
        <div class="metric">
          <span>容器数量</span>
          <strong id="containerCount">0</strong>
        </div>
        <div class="metric">
          <span>需要处理</span>
          <strong id="badCount">0</strong>
        </div>
        <div class="metric">
          <span>后台监控</span>
          <strong id="monitorState">检查中</strong>
        </div>
        <div class="metric">
          <span>下次检查</span>
          <strong id="nextCheck">-</strong>
        </div>
        <div class="metric">
          <span>上次刷新</span>
          <strong id="lastRefresh">-</strong>
        </div>
      </section>

      <main class="layout">
        <section class="panel containers-panel">
          <div class="panel-head">
            <div>
              <h2>容器编排</h2>
              <p>数字越小越先启动，后一个会等待前一个就绪。</p>
            </div>
            <button id="saveBtn" type="button">保存配置</button>
          </div>
          <div class="toolbar" aria-label="容器筛选">
            <input id="searchInput" type="search" placeholder="搜索容器、镜像或 ID" />
            <select id="statusFilter" aria-label="状态筛选">
              <option value="all">全部状态</option>
              <option value="running">运行正常</option>
              <option value="problem">需要处理</option>
              <option value="stopped">已停止</option>
            </select>
            <label class="inline-check">
              <input id="monitoredOnly" type="checkbox" />
              只看监控
            </label>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>顺序</th>
                  <th>容器</th>
                  <th>镜像</th>
                  <th>状态</th>
                  <th>延迟</th>
                  <th>监控</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="containerRows"></tbody>
            </table>
          </div>
          <div id="emptyState" class="empty hidden">没有发现容器。</div>
        </section>

        <aside class="side">
          <section class="panel settings-panel">
            <div class="panel-head compact">
              <div>
                <h2>监控设置</h2>
                <p>控制巡检、重试和启动等待时间。</p>
              </div>
            </div>
            <label>
              检查间隔（秒）
              <input id="checkInterval" type="number" min="10" max="3600" />
            </label>
            <label>
              重试间隔（秒）
              <input id="retryDelay" type="number" min="3" max="600" />
            </label>
            <label>
              启动超时（秒）
              <input id="startupTimeout" type="number" min="15" max="3600" />
            </label>
          </section>

          <section class="panel logs-panel">
            <div class="panel-head">
              <div>
                <h2>运行日志</h2>
                <p>最近的启动、重启和状态检查记录。</p>
              </div>
              <div class="log-actions">
                <button id="toggleLogsBtn" type="button">折叠</button>
                <button id="reloadLogsBtn" type="button">重载</button>
              </div>
            </div>
            <div id="logs" class="logs"></div>
          </section>
        </aside>
      </main>
    </div>
    <script>
      window.DOCKER_MANAGER_BASE = "/app/dockermanager";
    </script>
    <script type="module" src="/app/dockermanager/app.js"></script>
  </body>
</html>
