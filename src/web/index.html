<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Docker Manager</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/app/dockermanager/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true"><span></span><span></span><span></span></div>
          <div>
            <h1>Docker Manager</h1>
            <p>容器启动顺序与健康守护</p>
          </div>
        </div>
        <div class="actions">
          <button id="refreshBtn" type="button">刷新</button>
          <button id="startupBtn" class="primary" type="button">按顺序启动</button>
        </div>
      </header>

      <section id="alert" class="alert hidden" role="status"></section>

      <section class="overview" aria-label="运行概览">
        <div class="metric">
          <span>Docker</span>
          <strong id="dockerState">检查中</strong>
        </div>
        <div class="metric">
          <span>后台守护</span>
          <strong id="monitorState">检查中</strong>
        </div>
        <div class="metric">
          <span>容器</span>
          <strong id="containerCount">0</strong>
        </div>
        <div class="metric">
          <span>需要处理</span>
          <strong id="badCount">0</strong>
        </div>
        <div class="metric">
          <span>监控中</span>
          <strong id="monitoredCount">0</strong>
        </div>
        <div class="metric">
          <span>下次检查</span>
          <strong id="nextCheck">-</strong>
        </div>
      </section>

      <main class="layout">
        <section class="workspace">
          <section class="panel plan-panel">
            <div class="panel-head">
              <div>
                <h2>启动计划</h2>
                <p>按顺序守护依赖链，前一个未就绪时不会处理后续容器。</p>
              </div>
              <button id="saveBtn" type="button">保存配置</button>
            </div>
            <div id="planRows" class="plan-list"></div>
          </section>

          <section class="panel inventory-panel">
            <div class="panel-head">
              <div>
                <h2>容器清单</h2>
                <p>查看 Compose 分组、状态、端口和手动操作。</p>
              </div>
              <label class="switch">
                <input id="groupByProject" type="checkbox" checked />
                项目分组
              </label>
            </div>
            <div class="toolbar">
              <input id="searchInput" type="search" placeholder="搜索名称、镜像、ID、项目或服务" />
              <select id="statusFilter" aria-label="状态筛选">
                <option value="all">全部状态</option>
                <option value="running">运行正常</option>
                <option value="problem">需要处理</option>
                <option value="stopped">已停止</option>
                <option value="missing">已失联</option>
              </select>
              <label class="switch">
                <input id="monitoredOnly" type="checkbox" />
                只看监控
              </label>
            </div>
            <div id="inventoryRows" class="inventory-list"></div>
            <div id="emptyState" class="empty hidden">没有符合条件的容器。</div>
          </section>
        </section>

        <aside class="side">
          <section class="panel settings-panel">
            <div class="panel-head compact">
              <div>
                <h2>守护设置</h2>
                <p>控制后台巡检、重试、启动恢复和保护策略。</p>
              </div>
            </div>
            <label>检查间隔（秒）<input id="checkInterval" type="number" min="10" max="3600" /></label>
            <label>重试间隔（秒）<input id="retryDelay" type="number" min="3" max="600" /></label>
            <label>启动超时（秒）<input id="startupTimeout" type="number" min="15" max="3600" /></label>
            <label>日志保留（行）<input id="logRetention" type="number" min="100" max="5000" /></label>
            <label class="switch wide"><input id="autoRunOnStart" type="checkbox" /> 应用启动后立即巡检</label>
            <label class="switch wide"><input id="protectManager" type="checkbox" /> 保护 Docker Manager 容器</label>
            <div class="split-actions">
              <button id="exportConfigBtn" type="button">导出配置</button>
              <button id="importConfigBtn" type="button">导入配置</button>
              <input id="importConfigInput" class="hidden" type="file" accept="application/json,.json" />
            </div>
          </section>

          <section class="panel logs-panel">
            <div class="panel-head">
              <div>
                <h2>事件日志</h2>
                <p>巡检、启动、重启、失败和配置变更。</p>
              </div>
              <div class="log-actions">
                <button id="exportLogsBtn" type="button">导出</button>
                <button id="clearLogsBtn" class="danger" type="button">清空</button>
              </div>
            </div>
            <input id="logSearchInput" type="search" placeholder="筛选日志" />
            <div id="logs" class="logs"></div>
          </section>
        </aside>
      </main>
    </div>

    <aside id="detailDrawer" class="drawer hidden" aria-label="容器详情">
      <div class="drawer-head">
        <div>
          <h2 id="detailTitle">容器详情</h2>
          <p id="detailSubtitle"></p>
        </div>
        <button id="closeDetailsBtn" type="button">关闭</button>
      </div>
      <div id="detailBody" class="detail-body"></div>
    </aside>

    <div id="modalBackdrop" class="modal-backdrop hidden">
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <h2 id="modalTitle">确认操作</h2>
        <p id="modalMessage"></p>
        <div class="modal-actions">
          <button id="modalCancelBtn" type="button">取消</button>
          <button id="modalConfirmBtn" class="danger" type="button">确认</button>
        </div>
      </section>
    </div>

    <script>
      window.DOCKER_MANAGER_BASE = "/app/dockermanager";
    </script>
    <script type="module" src="/app/dockermanager/app.js"></script>
  </body>
</html>
